<svg viewBox="0 0 1100 1150" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="schemaBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b8860b"/>
      <stop offset="100%" stop-color="#8b6508"/>
    </linearGradient>
    <linearGradient id="layer1Bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a3f7a"/>
      <stop offset="100%" stop-color="#2e3266"/>
    </linearGradient>
    <linearGradient id="layer2Bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a6e5c"/>
      <stop offset="100%" stop-color="#15594a"/>
    </linearGradient>
    <linearGradient id="fusionBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b3a2a"/>
      <stop offset="100%" stop-color="#6e2e22"/>
    </linearGradient>
    <linearGradient id="outputBg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8b7000"/>
      <stop offset="100%" stop-color="#6e5800"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1100" height="1150" fill="#1a1a2e" rx="12"/>

  <!-- Title -->
  <text x="550" y="38" text-anchor="middle" fill="#e0e0e0" font-size="20" font-weight="600">Information Extraction (Schema-Driven Design)</text>

  <!-- ═══ EXTRACTION SCHEMA (top) ═══ -->
  <rect x="350" y="58" width="400" height="50" rx="25" fill="url(#schemaBg)" filter="url(#shadow)"/>
  <text x="550" y="80" text-anchor="middle" fill="#fff" font-size="15" font-weight="600">Extraction Schema</text>
  <text x="550" y="97" text-anchor="middle" fill="#ffe0a0" font-size="11">Entity types, attribute dimensions, normalization config</text>

  <!-- Schema source annotation -->
  <text x="550" y="126" text-anchor="middle" fill="#888" font-size="11" font-style="italic">↑ Derived from specification document or configured per domain</text>

  <!-- Dashed lines from schema to both paths -->
  <line x1="450" y1="108" x2="250" y2="166" stroke="#b8860b" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.6"/>
  <line x1="650" y1="108" x2="850" y2="166" stroke="#b8860b" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.6"/>
  <text x="200" y="156" text-anchor="middle" fill="#b8860b" font-size="11">Guides extraction</text>
  <text x="900" y="156" text-anchor="middle" fill="#b8860b" font-size="11">Guides filtering</text>

  <!-- ═══ LAYER 1 BORDER (general core) ═══ -->
  <rect x="30" y="170" width="1040" height="700" rx="8" fill="none" stroke="#6a6eb5" stroke-width="2" stroke-dasharray="10,5" opacity="0.5"/>
  <rect x="40" y="160" width="160" height="22" rx="4" fill="#1a1a2e"/>
  <text x="50" y="176" fill="#8a8ee0" font-size="12" font-weight="600">LAYER 1 — General Core</text>

  <!-- ═══ UNSTRUCTURED PATH ═══ -->
  <text x="265" y="200" text-anchor="middle" fill="#aaa" font-size="13" font-weight="500">Unstructured path</text>

  <!-- Input: Unstructured text -->
  <rect x="115" y="216" width="300" height="44" rx="6" fill="#3a3a3a" filter="url(#shadow)"/>
  <text x="265" y="236" text-anchor="middle" fill="#ddd" font-size="14" font-weight="500">Unstructured text</text>
  <text x="265" y="252" text-anchor="middle" fill="#999" font-size="11">Free-text documents</text>

  <!-- Arrow -->
  <line x1="265" y1="260" x2="265" y2="286" stroke="#666" stroke-width="1.5"/>
  <polygon points="265,290 260,282 270,282" fill="#666"/>

  <!-- Schema-driven entity extraction -->
  <rect x="100" y="292" width="330" height="52" rx="8" fill="url(#layer1Bg)" filter="url(#shadow)"/>
  <text x="265" y="314" text-anchor="middle" fill="#fff" font-size="14" font-weight="600">Schema-driven entity extraction</text>
  <text x="265" y="332" text-anchor="middle" fill="#b0b4e8" font-size="11">Extract mentions by schema-defined entity types</text>

  <!-- Arrow -->
  <line x1="265" y1="344" x2="265" y2="370" stroke="#666" stroke-width="1.5"/>
  <polygon points="265,374 260,366 270,366" fill="#666"/>

  <!-- Attribute classifiers (two boxes connected) -->
  <rect x="100" y="376" width="330" height="52" rx="8" fill="url(#layer1Bg)" filter="url(#shadow)"/>
  <text x="265" y="398" text-anchor="middle" fill="#fff" font-size="14" font-weight="600">Attribute classifiers</text>
  <text x="265" y="416" text-anchor="middle" fill="#b0b4e8" font-size="11">Classify on each schema-defined attribute dimension</text>

  <!-- Arrow -->
  <line x1="265" y1="428" x2="265" y2="454" stroke="#666" stroke-width="1.5"/>
  <polygon points="265,458 260,450 270,450" fill="#666"/>

  <!-- Entity normalization -->
  <rect x="100" y="460" width="330" height="52" rx="8" fill="url(#layer1Bg)" filter="url(#shadow)"/>
  <rect x="100" y="460" width="330" height="52" rx="8" fill="none" stroke="#1a6e5c" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="265" y="482" text-anchor="middle" fill="#fff" font-size="14" font-weight="600">Entity normalization</text>
  <text x="265" y="500" text-anchor="middle" fill="#7ecbba" font-size="11">Domain adapter interface (pluggable)</text>

  <!-- Arrow to fusion -->
  <line x1="265" y1="512" x2="265" y2="560" stroke="#666" stroke-width="1.5"/>
  <polygon points="265,564 260,556 270,556" fill="#666"/>
  <text x="275" y="548" fill="#999" font-size="11">Text evidence</text>

  <!-- ═══ STRUCTURED PATH ═══ -->
  <text x="835" y="200" text-anchor="middle" fill="#aaa" font-size="13" font-weight="500">Structured path</text>

  <!-- Input: Structured data -->
  <rect x="685" y="216" width="300" height="44" rx="6" fill="#3a3a3a" filter="url(#shadow)"/>
  <text x="835" y="236" text-anchor="middle" fill="#ddd" font-size="14" font-weight="500">Structured data</text>
  <text x="835" y="252" text-anchor="middle" fill="#999" font-size="11">Coded tables, databases</text>

  <!-- Arrow -->
  <line x1="835" y1="260" x2="835" y2="286" stroke="#666" stroke-width="1.5"/>
  <polygon points="835,290 830,282 840,282" fill="#666"/>

  <!-- Code-to-schema mapping -->
  <rect x="670" y="292" width="330" height="52" rx="8" fill="url(#layer1Bg)" filter="url(#shadow)"/>
  <rect x="670" y="292" width="330" height="52" rx="8" fill="none" stroke="#1a6e5c" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="835" y="314" text-anchor="middle" fill="#fff" font-size="14" font-weight="600">Code-to-schema mapping</text>
  <text x="835" y="332" text-anchor="middle" fill="#7ecbba" font-size="11">Map source codes → target schema items (adapter)</text>

  <!-- Arrow -->
  <line x1="835" y1="344" x2="835" y2="370" stroke="#666" stroke-width="1.5"/>
  <polygon points="835,374 830,366 840,366" fill="#666"/>

  <!-- Temporal filtering -->
  <rect x="670" y="376" width="330" height="52" rx="8" fill="url(#layer1Bg)" filter="url(#shadow)"/>
  <text x="835" y="398" text-anchor="middle" fill="#fff" font-size="14" font-weight="600">Temporal filtering</text>
  <text x="835" y="416" text-anchor="middle" fill="#b0b4e8" font-size="11">Apply schema-defined look-back periods + dates</text>

  <!-- Arrow -->
  <line x1="835" y1="428" x2="835" y2="454" stroke="#666" stroke-width="1.5"/>
  <polygon points="835,458 830,450 840,450" fill="#666"/>

  <!-- Active status check -->
  <rect x="670" y="460" width="330" height="52" rx="8" fill="url(#layer1Bg)" filter="url(#shadow)"/>
  <rect x="670" y="460" width="330" height="52" rx="8" fill="none" stroke="#1a6e5c" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="835" y="482" text-anchor="middle" fill="#fff" font-size="14" font-weight="600">Active status check</text>
  <text x="835" y="500" text-anchor="middle" fill="#7ecbba" font-size="11">Domain-specific activity flags (adapter)</text>

  <!-- Arrow to fusion -->
  <line x1="835" y1="512" x2="835" y2="560" stroke="#666" stroke-width="1.5"/>
  <polygon points="835,564 830,556 840,556" fill="#666"/>
  <text x="825" y="548" text-anchor="end" fill="#999" font-size="11">Coded evidence</text>

  <!-- ═══ EVIDENCE FUSION ═══ -->
  <rect x="200" y="570" width="700" height="58" rx="8" fill="url(#fusionBg)" filter="url(#shadow)"/>
  <text x="550" y="594" text-anchor="middle" fill="#fff" font-size="15" font-weight="600">Evidence fusion</text>
  <text x="550" y="614" text-anchor="middle" fill="#e8b0a0" font-size="12">Merge, resolve conflicts, compute confidence scores</text>

  <!-- Arrow -->
  <line x1="550" y1="628" x2="550" y2="658" stroke="#666" stroke-width="1.5"/>
  <polygon points="550,662 545,654 555,654" fill="#666"/>

  <!-- Output -->
  <rect x="250" y="666" width="600" height="50" rx="8" fill="url(#outputBg)" filter="url(#shadow)"/>
  <text x="550" y="688" text-anchor="middle" fill="#fff" font-size="14" font-weight="600">Evidence package for target schema</text>
  <text x="550" y="704" text-anchor="middle" fill="#ffe0a0" font-size="11">Entities + attributes + codes + confidence + source attribution</text>

  <!-- ═══ LAYER 2 LEGEND ═══ -->
  <rect x="30" y="900" width="1040" height="230" rx="8" fill="#1e1e30" stroke="#1a6e5c" stroke-width="1.5" opacity="0.7"/>
  <text x="550" y="928" text-anchor="middle" fill="#4eceb5" font-size="14" font-weight="600">LAYER 2 — Domain Adapter (Clinical / MDS Example)</text>

  <!-- Legend items in a grid -->
  <!-- Row 1: Schema config -->
  <rect x="60" y="948" width="480" height="36" rx="5" fill="#1a3a32" opacity="0.7"/>
  <text x="75" y="966" fill="#4eceb5" font-size="12" font-weight="500">Extraction Schema:</text>
  <text x="200" y="966" fill="#aaa" font-size="11">entity_types = [Disease, Drug, Procedure] | attributes = [assertion, temporality]</text>

  <!-- Row 2: Entity normalization -->
  <rect x="60" y="992" width="480" height="36" rx="5" fill="#1a3a32" opacity="0.7"/>
  <text x="75" y="1010" fill="#4eceb5" font-size="12" font-weight="500">Entity Normalization:</text>
  <text x="215" y="1010" fill="#aaa" font-size="11">RxNorm (drugs) → UMLS (diseases) → ICD/ATC/PCS codes</text>

  <!-- Row 3: Structured mappings -->
  <rect x="60" y="1036" width="480" height="36" rx="5" fill="#1a3a32" opacity="0.7"/>
  <text x="75" y="1054" fill="#4eceb5" font-size="12" font-weight="500">Code-to-Schema Maps:</text>
  <text x="225" y="1054" fill="#aaa" font-size="11">ICD→Section I | ATC→Section N | PCS→Section O</text>

  <!-- Row 4: Active status -->
  <rect x="60" y="1080" width="480" height="36" rx="5" fill="#1a3a32" opacity="0.7"/>
  <text x="75" y="1098" fill="#4eceb5" font-size="12" font-weight="500">Active Status Flags:</text>
  <text x="215" y="1098" fill="#aaa" font-size="11">Present-on-admission (POA), DRG, discharge vs. historical lists</text>

  <!-- Adapter note on right side -->
  <rect x="570" y="948" width="480" height="168" rx="5" fill="none" stroke="#1a6e5c" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
  <text x="810" y="975" text-anchor="middle" fill="#7ecbba" font-size="12" font-weight="500">Components with dashed green border</text>
  <text x="810" y="995" text-anchor="middle" fill="#7ecbba" font-size="12" font-weight="500">are pluggable domain adapters.</text>
  <text x="810" y="1025" text-anchor="middle" fill="#999" font-size="11">To use for a different domain (e.g., ICD coding,</text>
  <text x="810" y="1042" text-anchor="middle" fill="#999" font-size="11">legal compliance), replace the adapter layer:</text>
  <text x="810" y="1065" text-anchor="middle" fill="#aaa" font-size="11">1. Define new entity types + attributes</text>
  <text x="810" y="1082" text-anchor="middle" fill="#aaa" font-size="11">2. Plug in domain-specific normalizers</text>
  <text x="810" y="1099" text-anchor="middle" fill="#aaa" font-size="11">3. Provide structured code mappings</text>

  <!-- Legend box for box colors -->
  <rect x="60" y="745" width="16" height="16" rx="3" fill="url(#layer1Bg)"/>
  <text x="84" y="758" fill="#aaa" font-size="11">= General (Layer 1)</text>
  <rect x="200" y="745" width="16" height="16" rx="3" fill="url(#layer1Bg)" stroke="#1a6e5c" stroke-width="2" stroke-dasharray="3,2"/>
  <text x="224" y="758" fill="#aaa" font-size="11">= Requires domain adapter (Layer 2)</text>
  <rect x="430" y="745" width="16" height="16" rx="3" fill="url(#fusionBg)"/>
  <text x="454" y="758" fill="#aaa" font-size="11">= Fusion / Integration</text>
  <rect x="610" y="745" width="16" height="16" rx="3" fill="url(#outputBg)"/>
  <text x="634" y="758" fill="#aaa" font-size="11">= Output</text>
</svg>
